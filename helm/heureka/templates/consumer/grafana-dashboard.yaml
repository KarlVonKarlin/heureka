apiVersion: v1
kind: ConfigMap
metadata:
  name: heureka-consumer-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  heureka-consumer.json: |
    {
      "title": "Heureka Consumer",
      "uid": "heureka-consumer",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Messages Processed (total)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "messages_processed_total{namespace=\"heureka\"}",
            "legendFormat": "processed"
          }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } }
        },
        {
          "id": 2,
          "title": "Messages Failed (total)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "messages_failed_total{namespace=\"heureka\"}",
            "legendFormat": "failed"
          }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } }
        },
        {
          "id": 3,
          "title": "DB Inserts (total by table)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 4 },
          "targets": [{
            "expr": "db_inserts_total{namespace=\"heureka\"}",
            "legendFormat": "{{"{{"}} table {{"}}"}}"
          }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 4,
          "title": "Message Processing Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(messages_processed_total{namespace=\"heureka\"}[5m])",
              "legendFormat": "processed/s"
            },
            {
              "expr": "rate(messages_failed_total{namespace=\"heureka\"}[5m])",
              "legendFormat": "failed/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": [{ "matcher": { "id": "byName", "options": "failed/s" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] }]
          }
        },
        {
          "id": 5,
          "title": "DB Insert Rate by Table",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [{
            "expr": "rate(db_inserts_total{namespace=\"heureka\"}[5m])",
            "legendFormat": "{{"{{"}} table {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 6,
          "title": "Message Processing Duration",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(message_processing_seconds_bucket{namespace=\"heureka\"}[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(message_processing_seconds_bucket{namespace=\"heureka\"}[5m]))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(message_processing_seconds_bucket{namespace=\"heureka\"}[5m]))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ],
      "schemaVersion": 36
    }
