version: '3.8'

services:

  consumer:
    build:
      context: .
      dockerfile: dockerfile
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_DB: "parameters"
      POSTGRES_HOST: "pghost"
      POSTGRES_USER: "user_name"
      POSTGRES_PASSWORD: "user_password"
      RABBITMQ_HOST: "rabbitmq"
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3.10.23-management
    container_name: rabbitmq3-management
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres
    ports:
      - "5432:5432"
    hostname: pghost
    environment:
      POSTGRES_DB: "parameters"
      POSTGRES_HOST: "pghost"
      POSTGRES_USER: "user_name"
      POSTGRES_PASSWORD: "user_password"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_name -d parameters"]
      interval: 10s
      timeout: 5s
      retries: 5
